<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock News Desk | AI Summarizer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --panel: #111111;
            --panel-border: #222222;
            --accent: #22C55E;
            --accent-hover: #16a34a;
            --text: #E5E5E5;
            --text-muted: #A3A3A3;
            --danger: #EF4444;
            --bullish: #22C55E;
            --bearish: #EF4444;
            --neutral: #737373;
            --card-bg: #151515;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.5;
            padding: 2rem 1rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        code, pre, .url-text {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Header & Stats */
        header {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .title-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #a3a3a3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-total { background: #fff; }
        .dot-bullish { background: var(--bullish); }
        .dot-bearish { background: var(--bearish); }
        .dot-neutral { background: var(--neutral); }

        /* Config & Input */
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 900px) {
            .config-grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        select {
            appearance: none;
            background: #000;
            border: 1px solid var(--panel-border);
            border-radius: 0.5rem;
            color: #fff;
            padding: 0.75rem;
            font-size: 0.875rem;
            transition: var(--transition);
            cursor: pointer;
            width: 100%;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .api-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--panel-border);
            border-radius: 0.5rem;
            color: #fff;
            padding: 0.75rem;
            font-size: 0.875rem;
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.1);
        }

        .api-status {
            position: absolute;
            right: 0.75rem;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            transition: var(--transition);
        }

        .api-status.saved {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        textarea {
            height: 120px;
            resize: vertical;
            font-family: 'JetBrains Mono', monospace;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--panel-border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Progress */
        .progress-container {
            margin: 1.5rem 0;
            display: none;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Results Grid */
        #results {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: 1rem;
            padding: 1.5rem;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1) forwards;
            opacity: 0;
            position: relative;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .card.error {
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .url-text {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .badge {
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-bullish { background: rgba(34, 197, 94, 0.15); color: var(--bullish); }
        .badge-bearish { background: rgba(239, 68, 68, 0.15); color: var(--bearish); }
        .badge-neutral { background: rgba(115, 115, 115, 0.15); color: var(--neutral); }

        .card-headline {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .card-tldr {
            font-size: 0.875rem;
            font-style: italic;
            color: var(--text-muted);
            background: rgba(255,255,255,0.03);
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            border-left: 3px solid var(--panel-border);
        }

        .card-bullets {
            list-style: none;
            margin-bottom: 1.25rem;
        }

        .card-bullets li {
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            padding-left: 1.25rem;
            position: relative;
        }

        .card-bullets li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--panel-border);
        }

        .tag {
            font-size: 0.75rem;
            font-weight: 600;
            background: #222;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            color: var(--text-muted);
        }

        .tag.ticker { color: var(--accent); }

        .copy-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            padding: 0.4rem;
            border-radius: 0.4rem;
            background: #222;
            color: var(--text-muted);
            display: none; /* Shown on hover */
        }

        .card:hover .copy-btn { display: flex; }

        .error-msg {
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
<body>

    <header>
        <div class="title-group">
            <h1>Stock News Desk</h1>
            <div class="api-status-pill">
                <div id="apiKeyIndicator" class="api-status"></div>
            </div>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-dot dot-total"></span>
                <span id="statTotal">0 Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-dot dot-bullish"></span>
                <span id="statBullish">0 Bullish</span>
            </div>
            <div class="stat-item">
                <span class="stat-dot dot-bearish"></span>
                <span id="statBearish">0 Bearish</span>
            </div>
            <div class="stat-item">
                <span class="stat-dot dot-neutral"></span>
                <span id="statNeutral">0 Neutral</span>
            </div>
        </div>
    </header>

    <main>
        <div class="config-grid">
            <div class="panel">
                <label for="apiKey">Gemini API Key</label>
                <div class="api-input-wrapper">
                    <input type="password" id="apiKey" placeholder="Enter key..." autocomplete="off">
                    <div id="apiKeyDot" class="api-status"></div>
                </div>
            </div>
            <div class="panel">
                <label for="geminiModel">Gemini Model</label>
                <select id="geminiModel">
                    <option value="gemini-1.5-flash" selected>gemini-1.5-flash (Standard)</option>
                    <option value="gemini-2.0-flash-exp">gemini-2.0-flash-exp (Experimental)</option>
                    <option value="gemini-2.0-pro-exp-02-05">gemini-2.0-pro-exp (Latest Pro)</option>
                    <option value="gemini-1.5-pro">gemini-1.5-pro (Stable Pro)</option>
                </select>
            </div>
            <div class="panel">
                <label for="urls">Article URLs (one per line)</label>
                <textarea id="urls" placeholder="https://www.marketwatch.com/story/...&#10;https://www.cnbc.com/2026/02/23/..."></textarea>
                <div class="actions">
                    <button id="summarizeBtn" class="btn-primary">
                        <span id="btnText">Summarize All</span>
                    </button>
                    <button id="clearBtn" class="btn-secondary">Clear All</button>
                </div>
            </div>
        </div>

        <div id="progressSection" class="progress-container">
            <div class="progress-text">
                <span id="statusText">Preparing...</span>
                <span id="progressCount">0/0</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
        </div>

        <div id="results"></div>
    </main>

    <script>
        const elements = {
            apiKey: document.getElementById('apiKey'),
            apiKeyDot: document.getElementById('apiKeyDot'),
            geminiModel: document.getElementById('geminiModel'),
            urls: document.getElementById('urls'),
            summarizeBtn: document.getElementById('summarizeBtn'),
            btnText: document.getElementById('btnText'),
            clearBtn: document.getElementById('clearBtn'),
            progressSection: document.getElementById('progressSection'),
            statusText: document.getElementById('statusText'),
            progressCount: document.getElementById('progressCount'),
            progressBar: document.getElementById('progressBar'),
            results: document.getElementById('results'),
            statTotal: document.getElementById('statTotal'),
            statBullish: document.getElementById('statBullish'),
            statBearish: document.getElementById('statBearish'),
            statNeutral: document.getElementById('statNeutral')
        };

        let stats = { total: 0, bullish: 0, bearish: 0, neutral: 0 };
        let isRunning = false;

        // Settings Persistence
        elements.apiKey.value = localStorage.getItem('gemini_api_key') || '';
        elements.geminiModel.value = localStorage.getItem('gemini_model') || 'gemini-1.5-flash';
        updateApiStatus();

        elements.apiKey.addEventListener('input', (e) => {
            localStorage.setItem('gemini_api_key', e.target.value);
            updateApiStatus();
        });

        elements.geminiModel.addEventListener('change', (e) => {
            localStorage.setItem('gemini_model', e.target.value);
        });

        function updateApiStatus() {
            if (elements.apiKey.value.trim().length > 10) {
                elements.apiKeyDot.classList.add('saved');
            } else {
                elements.apiKeyDot.classList.remove('saved');
            }
        }

        // Action Handlers
        elements.clearBtn.addEventListener('click', () => {
            if (isRunning) return;
            elements.results.innerHTML = '';
            stats = { total: 0, bullish: 0, bearish: 0, neutral: 0 };
            updateStats();
        });

        elements.summarizeBtn.addEventListener('click', processUrls);

        async function processUrls() {
            const key = elements.apiKey.value.trim();
            const urlInput = elements.urls.value.trim();
            
            if (!key) return alert('Please enter your Gemini API key.');
            if (!urlInput) return alert('Please enter at least one URL.');

            const urlList = urlInput.split('\n').map(u => u.trim()).filter(u => u.length > 0);
            if (urlList.length === 0) return;

            isRunning = true;
            elements.summarizeBtn.disabled = true;
            elements.progressSection.style.display = 'block';
            
            for (let i = 0; i < urlList.length; i++) {
                const url = urlList[i];
                updateProgress(i + 1, urlList.length, `Fetching: ${url}`);
                
                try {
                    const content = await fetchArticle(url);
                    if (content.length < 200) throw new Error('Insufficient content fetched.');

                    updateProgress(i + 1, urlList.length, `Analyzing with Gemini...`);
                    const summary = await summarizeWithGemini(content, key);
                    
                    addCard(url, summary);
                } catch (err) {
                    console.error(err);
                    addErrorCard(url, err.message);
                }
            }

            isRunning = false;
            elements.summarizeBtn.disabled = false;
            elements.statusText.innerText = 'Completed';
            elements.progressBar.style.width = '100%';
        }

        function updateProgress(current, total, text) {
            elements.statusText.innerText = text;
            elements.progressCount.innerText = `${current}/${total}`;
            elements.progressBar.style.width = `${(current / total) * 100}%`;
        }

        function updateStats() {
            elements.statTotal.innerText = `${stats.total} Total`;
            elements.statBullish.innerText = `${stats.bullish} Bullish`;
            elements.statBearish.innerText = `${stats.bearish} Bearish`;
            elements.statNeutral.innerText = `${stats.neutral} Neutral`;
        }

        async function fetchArticle(url) {
            // Strategy 1: Jina.ai
            try {
                const res = await fetch(`https://r.jina.ai/${url}`, { headers: { 'Accept': 'text/plain' } });
                if (res.ok) {
                    const text = await res.text();
                    if (text.length > 200) return text;
                }
            } catch (e) {}

            // Strategy 2: AllOrigins Proxy
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                if (res.ok) {
                    const data = await res.json();
                    const text = extractTextFromHtml(data.contents);
                    if (text.length > 200) return text;
                }
            } catch (e) {}

            // Strategy 3: CodeTabs Proxy
            try {
                const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
                if (res.ok) {
                    const html = await res.text();
                    const text = extractTextFromHtml(html);
                    if (text.length > 200) return text;
                }
            } catch (e) {}

            throw new Error('Could not fetch article content from any source.');
        }

        function extractTextFromHtml(html) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Remove noise
            const selectors = ['script', 'style', 'nav', 'footer', 'header', 'aside', '.ad', '.sidebar'];
            selectors.forEach(s => {
                doc.querySelectorAll(s).forEach(el => el.remove());
            });

            return doc.body.innerText.replace(/\s+/g, ' ').trim();
        }

        async function summarizeWithGemini(text, key) {
            const model = elements.geminiModel.value;
            const prompt = `Analyze this stock news article and return ONLY a JSON object (no markdown, no backticks).
            JSON schema: { "headline": "string", "tldr": "string", "bullets": ["string", "string", "string"], "signal": "BULLISH"|"BEARISH"|"NEUTRAL", "tickers": ["string"], "sector": "string" }
            Article content: ${text.substring(0, 15000)}`;

            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
            
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.1 }
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Gemini API call failed.');
            }

            const data = await response.json();
            const rawText = data.candidates[0].content.parts[0].text;
            
            // Clean up possible markdown wrappers if Gemini ignores instructions
            const jsonStr = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
            return JSON.parse(jsonStr);
        }

        function addCard(url, summary) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const signalClass = `badge-${summary.signal.toLowerCase()}`;
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="url-text" title="${url}">${url}</span>
                    <span class="badge ${signalClass}">${summary.signal}</span>
                </div>
                <button class="copy-btn" onclick="copyCard(this)" title="Copy JSON">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
                <div class="card-headline">${summary.headline}</div>
                <div class="card-tldr">${summary.tldr}</div>
                <ul class="card-bullets">
                    ${summary.bullets.map(b => `<li>${b}</li>`).join('')}
                </ul>
                <div class="card-tags">
                    ${summary.tickers.map(t => `<span class="tag ticker">${t}</span>`).join('')}
                    <span class="tag">${summary.sector}</span>
                </div>
            `;

            elements.results.prepend(card);
            
            stats.total++;
            if (summary.signal === 'BULLISH') stats.bullish++;
            else if (summary.signal === 'BEARISH') stats.bearish++;
            else stats.neutral++;
            updateStats();
        }

        function addErrorCard(url, message) {
            const card = document.createElement('div');
            card.className = 'card error';
            card.innerHTML = `
                <div class="card-header">
                    <span class="url-text" title="${url}">${url}</span>
                    <span class="badge badge-bearish">ERROR</span>
                </div>
                <div class="card-headline">Failed to process article</div>
                <div class="error-msg">${message}</div>
            `;
            elements.results.prepend(card);
            stats.total++;
            updateStats();
        }

        function copyCard(btn) {
            const card = btn.closest('.card');
            const data = {
                headline: card.querySelector('.card-headline').innerText,
                tldr: card.querySelector('.card-tldr').innerText,
                bullets: Array.from(card.querySelectorAll('.card-bullets li')).map(li => li.innerText),
                signal: card.querySelector('.badge').innerText,
                tickers: Array.from(card.querySelectorAll('.tag.ticker')).map(t => t.innerText),
                sector: card.querySelector('.card-tags span:last-child').innerText
            };
            navigator.clipboard.writeText(JSON.stringify(data, null, 2));
            
            const originalSvg = btn.innerHTML;
            btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            setTimeout(() => btn.innerHTML = originalSvg, 2000);
        }
    </script>
</body>
</html>
